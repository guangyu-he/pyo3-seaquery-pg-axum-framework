services:
  postgres:
    image: postgres:18
    container_name: test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: testdbuser
      POSTGRES_PASSWORD: testdbpass
      POSTGRES_DB: testdb
      TZ: Europe/Berlin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U testdbuser -d testdb" ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
